# ============================================
# ECommerce-IA — Docker Compose
# ============================================
# 5 services : API, Dashboard, Database, ChromaDB, Frontend
#
# Auteur : BAWANA Théodore — Projet SAHELYS
# ============================================

version: "3.9"

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: ecommerce-ia-db
    environment:
      POSTGRES_DB: ecommerce_ia
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecommerce_secure_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce_ia"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ecommerce-net

  # ============================================
  # ChromaDB — Base vectorielle pour RAG
  # ============================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: ecommerce-ia-chromadb
    ports:
      - "8080:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - ecommerce-net

  # ============================================
  # API FastAPI + Modèles IA
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ecommerce-ia-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ecommerce:${DB_PASSWORD:-ecommerce_secure_2024}@db:5432/ecommerce_ia
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your_super_secret_jwt_key_2024}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - DEBUG=False
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - model_data:/app/models
      - ./data:/app/data
      - ./results:/app/results
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - ecommerce-net
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --log-level info

  # ============================================
  # Dashboard Streamlit
  # ============================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ecommerce-ia-dashboard
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://ecommerce:${DB_PASSWORD:-ecommerce_secure_2024}@db:5432/ecommerce_ia
      - API_URL=http://api:8000
    volumes:
      - model_data:/app/models
      - ./results:/app/results
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ecommerce-net
    command: >
      streamlit run app/streamlit_demo.py
      --server.port 8501
      --server.headless true
      --server.address 0.0.0.0
      --browser.gatherUsageStats false

  # ============================================
  # Frontend Next.js
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ecommerce-ia-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_WS_URL=ws://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ecommerce-net

# ============================================
# Volumes persistants
# ============================================
volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  model_data:
    driver: local

# ============================================
# Réseau interne
# ============================================
networks:
  ecommerce-net:
    driver: bridge
